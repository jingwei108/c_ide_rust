<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>C IDE</title>
    <base href="/" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Cide.Client.Maui.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body style="background:#1e1e1e; color:#d4d4d4;">
    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="js/canvas-interop.js"></script>
    <script src="js/codemirror-interop.js"></script>
    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
        // Android WebView touch-scroll fix
        (function() {
            function fixCodeMirrorScroller() {
                var pane = document.querySelector('.editor-pane');
                var editor = document.querySelector('.cm-editor');
                var scroller = document.querySelector('.cm-scroller');
                if (!pane || !editor || !scroller) return;

                var paneH = pane.clientHeight;
                // Force cm-editor to fill editor-pane height explicitly (do NOT use position:absolute
                // because intermediate wrapper may become a 0-height containing block)
                editor.style.position = 'relative';
                editor.style.width = '100%';
                editor.style.height = paneH + 'px';

                // Gutters are absolutely positioned and do NOT consume flow space.
                // The scroller must fill the entire editor height.
                scroller.style.height = paneH + 'px';
                scroller.style.maxHeight = paneH + 'px';
                scroller.style.overflow = 'auto';
                scroller.style.webkitOverflowScrolling = 'touch';
                scroller.style.touchAction = 'pan-x pan-y';
            }

            // Watch for CodeMirror mutating cm-editor / cm-scroller style and re-apply our fix
            var _cmObserver = null;
            function startObserver() {
                var editor = document.querySelector('.cm-editor');
                var scroller = document.querySelector('.cm-scroller');
                if ((editor || scroller) && !_cmObserver) {
                    _cmObserver = new MutationObserver(function(mutations) {
                        fixCodeMirrorScroller();
                    });
                    if (editor) _cmObserver.observe(editor, { attributes: true, attributeFilter: ['style'] });
                    if (scroller) _cmObserver.observe(scroller, { attributes: true, attributeFilter: ['style'] });
                }
            }

            window.addEventListener('load', function() {
                fixCodeMirrorScroller();
                startObserver();
            });
            window.addEventListener('resize', fixCodeMirrorScroller);
            setInterval(function() {
                fixCodeMirrorScroller();
                startObserver();
            }, 2000);
        })();
    </script>
</body>
</html>
