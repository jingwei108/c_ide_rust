name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rust:
    name: Rust Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          cache: true

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate
        working-directory: CideFlutter

      - name: Build native (Debug)
        run: cargo build
        working-directory: native

      - name: Build native (Release)
        run: cargo build --release
        working-directory: native

      - name: Check Bytecode Libc precompiled artifacts are up-to-date
        run: python scripts/precompile_bytecode_libc.py --check
        shell: bash

      - name: Run Rust tests
        run: cargo test --workspace --all-features
        working-directory: native

      # cargo test 已覆盖全部单元/集成测试（含 Phase A/B/C/E/Dogfooding），
      # 无需再单独运行各防线测试套件。
      - name: Three Tier Consistency Check & Report
        run: python scripts/ci_three_tier_check.py
        shell: bash

      - name: Upload Three Tier Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: three-tier-report
          path: reports/three_tier_report.md

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
        working-directory: native

      - name: Shadow Verification
        run: python native/tests/shadow_verification/shadow_verify.py --report native/tests/shadow_verification/reports/shadow_report.md --json native/tests/shadow_verification/reports/shadow_data.json
        shell: bash

      - name: Upload Shadow Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shadow-verification-report
          path: |
            native/tests/shadow_verification/reports/shadow_report.md
            native/tests/shadow_verification/reports/kr_leetcode_report.json

      - name: C++ Shadow Verification
        run: python scripts/shadow_verify_cpp.py
        shell: bash

      - name: Upload C++ Shadow Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cpp-shadow-verification-report
          path: native/tests/shadow_verification/reports/cpp_shadow_report.json

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --version 0.6.16
        # 固定版本，避免非确定性；rust-cache 已缓存 cargo 目录

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info
        working-directory: native

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: native/lcov.info

  flutter:
    name: Flutter Build & Test
    runs-on: windows-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      # Flutter 3.29 在 Windows 上总是根据检测到的 VS 版本显式传入 -G <generator>，
      # 导致 CI 中设置的 CMAKE_GENERATOR 环境变量被覆盖。当 runner 检测异常时，
      # 会回退到 Visual Studio 16 2019 但实例不存在。此 patch 让 Flutter 工具优先
      # 读取 CMAKE_GENERATOR 环境变量，使历史修复真正生效。
      - name: Patch Flutter tools to honor CMAKE_GENERATOR
        run: python scripts/patch_flutter_windows_generator.py
        shell: bash

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: CideFlutter

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate
        working-directory: CideFlutter

      # 提前构建 Rust DLL，使 cide_native 插件的 Windows CMakeLists.txt 能直接使用
      # 预构建产物，避免在 MSBuild 中通过 cargokit 调用 cargo 时因环境/路径问题失败。
      - name: Build native DLL (Debug)
        run: cargo build
        working-directory: native

      - name: Build native DLL (Release)
        run: cargo build --release
        working-directory: native

      - name: Run Flutter tests
        run: flutter test
        working-directory: CideFlutter

      - name: Clean Windows build cache
        run: if exist build\windows\x64 rmdir /s /q build\windows\x64
        working-directory: CideFlutter
        shell: cmd

      - name: Build Windows (Debug)
        run: flutter build windows --debug -v
        working-directory: CideFlutter
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022

      - name: Build Windows (Release)
        run: flutter build windows --release -v
        working-directory: CideFlutter
        env:
          CMAKE_GENERATOR: Visual Studio 17 2022

  android:
    name: Android Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 3.5.4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          packages: 'ndk;27.1.12297006'

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          cache: true

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Configure Android SDK/Flutter paths
        run: |
          $flutterRoot = (Get-Command flutter).Source | Split-Path -Parent | Split-Path -Parent
          Remove-Item -Path CideFlutter/android/local.properties -Force -ErrorAction SilentlyContinue
          @"
          sdk.dir=$env:ANDROID_SDK_ROOT
          flutter.sdk=$flutterRoot
          "@ | Out-File -FilePath CideFlutter/android/local.properties
          "ANDROID_NDK_HOME=$env:ANDROID_SDK_ROOT\ndk\27.1.12297006" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: CideFlutter

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate
        working-directory: CideFlutter

      - name: Build Rust Android .so (arm64 + armv7)
        run: cargo ndk -t aarch64-linux-android -t armv7-linux-androideabi --platform 21 build
        working-directory: native

      - name: Run Flutter Dart tests
        run: flutter test
        working-directory: CideFlutter

      - name: Build Android APK
        run: flutter build apk --debug
        working-directory: CideFlutter

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-apk
          path: CideFlutter/build/app/outputs/flutter-apk/app-debug.apk
