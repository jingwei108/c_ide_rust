name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  rust:
    name: Rust Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Build native (Debug)
        run: cargo build
        working-directory: native

      - name: Build native (Release)
        run: cargo build --release
        working-directory: native

      - name: Check Bytecode Libc precompiled artifacts are up-to-date
        run: python scripts/precompile_bytecode_libc.py --check
        shell: bash

      - name: Run Rust tests
        run: cargo test
        working-directory: native

      - name: Phase A - Host Contract Tests
        run: cargo test --test host_contract_tests
        working-directory: native

      - name: Phase B - Bytecode Libc Consistency
        run: cargo test --test bytecode_libc_consistency
        working-directory: native

      - name: Phase C - Differential Stress Tests
        run: cargo test --test differential_stress
        working-directory: native

      - name: Phase E - Fuzz Stress Tests
        run: cargo test --test fuzz_stress_test
        working-directory: native

      - name: Three Tier Consistency Check & Report
        run: python scripts/ci_three_tier_check.py
        shell: bash

      - name: Upload Three Tier Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: three-tier-report
          path: reports/three_tier_report.md

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: native

      - name: Shadow Verification
        run: python native/tests/shadow_verification/shadow_verify.py --cases native/tests/shadow_verification/cases --report reports/shadow_report.json
        shell: bash

      - name: Upload Shadow Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: shadow-verification-report
          path: reports/shadow_report.json

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Generate coverage report
        run: cargo llvm-cov --lcov --output-path lcov.info
        working-directory: native

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: native/lcov.info

  flutter:
    name: Flutter Build & Test
    runs-on: windows-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.12.0

      - name: Get Flutter dependencies
        run: flutter pub get
        working-directory: CideFlutter

      - name: Generate FRB bindings
        run: flutter_rust_bridge_codegen generate
        working-directory: CideFlutter

      - name: Run Flutter tests
        run: flutter test
        working-directory: CideFlutter

      - name: Build Windows (Debug)
        run: flutter build windows --debug
        working-directory: CideFlutter

      - name: Build Windows (Release)
        run: flutter build windows --release
        working-directory: CideFlutter
