name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    name: Rust Build & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native

      - name: Build native (Debug)
        run: cargo build
        working-directory: native

      - name: Run Rust tests
        run: cargo test
        working-directory: native

      - name: Run clippy
        run: cargo clippy -- -D warnings
        working-directory: native

  csharp:
    name: C# Build & Test
    runs-on: windows-latest
    needs: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build native DLL (Debug)
        run: cargo build
        working-directory: native

      - name: Build C# tests
        run: dotnet build Cide.Client.Tests/Cide.Client.Tests.csproj

      - name: Run C# tests
        run: dotnet test Cide.Client.Tests/Cide.Client.Tests.csproj --no-build
