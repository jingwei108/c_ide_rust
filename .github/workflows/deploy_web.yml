name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.x'
          channel: 'stable'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build Rust WASM
        run: |
          cd native
          wasm-pack build --target web --out-dir ../CideFlutter/web/pkg --no-opt

      - name: Build Flutter Web
        run: |
          cd CideFlutter
          flutter build web --release --base-href /c_ide_rust/

      - name: Add SPA fallback for GitHub Pages
        run: |
          cp CideFlutter/build/web/index.html CideFlutter/build/web/404.html

      - name: Verify build artifacts
        run: |
          test -f CideFlutter/build/web/index.html
          test -f CideFlutter/build/web/404.html
          test -f CideFlutter/build/web/pkg/cide_native_bg.wasm
          test -f CideFlutter/build/web/pkg/cide_native.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: CideFlutter/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 检查是否已配置 Gitee 同步密钥
  check-gitee-secret:
    runs-on: ubuntu-latest
    needs: deploy
    outputs:
      has_key: ${{ steps.check.outputs.has_key }}
    steps:
      - id: check
        run: echo "has_key=${{ secrets.GITEE_PRIVATE_KEY != '' }}" >> "$GITHUB_OUTPUT"

  # 可选：同步到 Gitee，需要先在 GitHub Secrets 配置 GITEE_PRIVATE_KEY
  sync-to-gitee:
    runs-on: ubuntu-latest
    needs: check-gitee-secret
    if: needs.check-gitee-secret.outputs.has_key == 'true'
    steps:
      - name: Sync to Gitee
        uses: wearerequired/git-mirror-action@v1
        env:
          SSH_PRIVATE_KEY: ${{ secrets.GITEE_PRIVATE_KEY }}
        with:
          source-repo: git@github.com:${{ github.repository }}.git
          destination-repo: git@gitee.com:${{ github.repository_owner }}/c_ide_rust.git
