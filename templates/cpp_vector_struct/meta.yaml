key: cpp_vector_struct
name: C++ 模板容器存储自定义结构体
category: C++容器

params:

tutorial:
  steps:
    - title: 类模板
      description: 使用 template<class T> 定义类模板，再用 vector<Point> 实例化出存储自定义结构体的容器。
      anchor: template_class
    - title: 自定义类型元素
      description: Point 是一个普通结构体，模板类 vector<T> 可以像存储 int 一样存储 Point，按值拷贝元素。
      anchor: custom_type_element
    - title: 动态扩容与元素拷贝
      description: push_back 扩容时通过 new[]/delete[] 重新分配内存，并用逐元素赋值完成拷贝。
      anchor: push_back_copy

knowledge_nodes:
  - CppTemplate
  - CppContainer
  - Struct
