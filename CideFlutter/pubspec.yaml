name: cide
description: C IDE - A cross-platform C programming IDE with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # Code Editor
  # re_editor 已移除，CideEditor 为自研 Gesture Proxy 内核。
  # re_highlight 保留用于语法高亮（原 re_editor 的 transitive dependency）。
  re_highlight: ^0.0.3

  # State Management
  flutter_riverpod: 2.6.1

  # Rust Bridge (Dart side)
  flutter_rust_bridge: ^2.12.0

  # Local persistence
  shared_preferences: ^2.5.0

  # Rust Builder (for Android/iOS/macOS/Linux automated builds)
  # On Windows, enable Developer Mode for symlink support, or manually copy DLL
  cide_native:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/templates/
    - assets/templates/index.json
