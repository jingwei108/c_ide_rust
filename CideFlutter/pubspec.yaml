name: cide
description: C IDE - A cross-platform C programming IDE with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # Code Editor
  # 注意：代码中通过 (obj as dynamic).privateMember 访问了 re_editor 的私有 API
  #（_editorKey、selectWord 等）。升级前必须人工核对内部实现是否变更。
  re_editor: 0.8.0  # 锁定确切版本，防止运行时异常

  # State Management
  flutter_riverpod: ^3.3.1

  # Rust Bridge (Dart side)
  flutter_rust_bridge: ^2.12.0

  # Local persistence
  shared_preferences: ^2.5.0

  # Rust Builder (for Android/iOS/macOS/Linux automated builds)
  # On Windows, enable Developer Mode for symlink support, or manually copy DLL
  cide_native:
    path: rust_builder

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
