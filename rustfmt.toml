# Cide 项目 Rust 代码统一格式化配置
# 使用: cargo fmt

edition = "2021"
max_width = 120
chain_width = 80
fn_call_width = 80
struct_lit_width = 30
array_width = 80

# 缩进
tab_spaces = 4
hard_tabs = false

# 换行
newline_style = "Unix"
use_small_heuristics = "Default"

# 导入
group_imports = "StdExternalCrate"
imports_granularity = "Module"
reorder_imports = true

# 其他
wrap_comments = true
format_code_in_doc_comments = true
